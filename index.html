<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cuenta regresiva para el Año Nuevo" />
    <style>
      @font-face {
        font-family: 'Snow For Santa';
        src: url('snow-for-santa/SnowForSanta.ttf') format('truetype');
      }

      body {
        font-family: 'Snow For Santa', sans-serif;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <title>Cuenta atrás — Año Nuevo</title>
  </head>
  <body>
    <div id="snowflakes" aria-hidden="true"></div>

    <main>
      <section class="container-start">
        <div class="year-badge" id="yearBadge">2027</div>
        <h1 class="glow-text">🥳 Cuenta atrás para el <span id="targetYear">2027</span> 🎉</h1>
        <p class="subtitle">¿Estás listo?</p>
        <div class="countdown">
          <div class="time-block">
            <span class="time-value" id="days">00</span>
            <span class="label">Días</span>
          </div>
          <div class="time-block">
            <span class="time-value" id="hours">00</span>
            <span class="label">Horas</span>
          </div>
          <div class="time-block">
            <span class="time-value" id="minutes">00</span>
            <span class="label">Minutos</span>
          </div>
          <div class="time-block">
            <span class="time-value" id="seconds">00</span>
            <span class="label">Segundos</span>
          </div>
        </div>
        <div class="progress-container">
          <div class="progress-label">Progreso del año</div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-text" id="progressText">0%</div>
        </div>
        <h2 class="family-message">Te desea la familia Antonio Rivera ❤️</h2>
        <button class="celebrate-btn" id="celebrateBtn">🎆 Celebrar ahora 🎆</button>
      </section>

      <section class="container-end">
        <div class="fireworks-icon">🎉🎊🎆</div>
        <h1 class="glow-text">"Brindo por un año lleno de salud, amor y prosperidad para ti y los tuyos. ¡Feliz Año Nuevo!"</h1>
        <h2>🎇 ¡Bienvenido <span id="newYearDisplay">2027</span>! 🎇</h2>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
